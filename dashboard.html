<!DOCTYPE html>

<html>
<head>
    <title>TerraSense</title>


<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>

body {
 
   font-family: 'Segoe UI', Arial;
    background: #f4f7f6;
    padding: 20px;
}

.container {
    max-width: 750px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    color: #2e7d32;
}

#map {
    height: 400px;
    width: 100%;
    margin: 15px 0;
    border-radius: 8px;
}

label {
    font-weight: 600;
    margin-top: 10px;
    display: block;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #1b5e20;
}

.result {
    margin-top: 20px;
    padding: 15px;
    background: #e8f5e9;
    border-radius: 8px;
    line-height: 1.6;
}

</style>


</head>

<body>
<div class="container"></div>

<h2>🌱 TerraSense</h2>

<label>Crop</label> <select id="crop"> <option>Maize</option> <option>Rice</option> <option>Cassava</option> <option>Millet</option> </select>

<label>Farm Size</label> <input id="size" value="2">

<label>Irrigation Method</label> <select id="method"> <option>Rain-fed</option> <option>Manual (bucket)</option> <option>Small pump</option> <option>Large pump</option> </select>

<label>Irrigation Frequency</label> <select id="frequency"> <option>Rarely</option> <option>Weekly</option> <option>2-3 times/week</option> <option>Daily</option> </select>

<p><b>Click map to select location</b></p>

<div id="map"></div>

<input id="lat" placeholder="Latitude" readonly>
<input id="lon" placeholder="Longitude" readonly>

<button onclick="analyzeFarm()">Analyze</button>

<div id="result" class="result"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// MAP
var map = L.map('map').setView([7.38, 3.93], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
}).addTo(map);

var marker;

map.on('click', function(e) {
    var lat = e.latlng.lat;
    var lon = e.latlng.lng;

    document.getElementById("lat").value = lat;
    document.getElementById("lon").value = lon;

    if (marker) map.removeLayer(marker);
    marker = L.marker([lat, lon]).addTo(map);
});


// ANALYZE
function analyzeFarm() {

    var lat = document.getElementById("lat").value;
    var lon = document.getElementById("lon").value;

    if (!lat || !lon) {
        alert("Select location first");
        return;
    }

    fetch("https://terrasense-ai.onrender.com/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            lat: parseFloat(lat),
            lon: parseFloat(lon),
            crop: document.getElementById("crop").value,
            farm_size: parseFloat(document.getElementById("size").value),
            method: document.getElementById("method").value,
            frequency: document.getElementById("frequency").value
        })
    })
    .then(res => res.json())
    .then(data => {

        var rainMsg = "";
        if (data.time_to_rain <= 3) {
            rainMsg = "🌧 Rain within 3 hours";
        } else if (data.time_to_rain <= 24) {
            rainMsg = "🌧 Rain in " + data.time_to_rain + " hrs";
        } else {
            rainMsg = "🌧 Rain in " + (data.time_to_rain/24).toFixed(1) + " days";
        }

        var output = "";

output += "<h3 style='color:#2e7d32'>" + data.icon + " " + data.crop_status + "</h3>";

output += "<p><b>Advice:</b> " + data.advice + "</p>";

output += "<hr>";

output += "🌤 <b>Season:</b> " + data.season + "<br>";
output += "🌡 <b>Temperature:</b> " + data.temperature + "°C<br>";
output += "🌧 <b>Rain (5d):</b> " + data.rain_5days + " mm<br>";
output += rainMsg + "<br><br>";

output += "🌿 <b>NDVI:</b> " + data.ndvi + "<br>";
output += data.vegetation_status + "<br><br>";

output += "🤖 <b>Water Saving:</b> " + data.water_saving + "%<br>";

output += "🌱 <b>Carbon:</b> " + data.carbon + " tons<br>";
output += "💰 <b>Credits:</b> " + data.carbon_credits + "<br>";
output += "💵 <b>Value:</b> $" + data.carbon_value_usd + "<br><br>";

output += "📊 <b>Climate Score:</b> " + data.climate_score;

document.getElementById("result").innerHTML = output;
    })
    .catch(err => alert(err));
}

</script>

</div>

</body>
</html>
