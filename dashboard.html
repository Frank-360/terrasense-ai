<!DOCTYPE html>

<html>
<head>
    <title>TerraSense Dashboard</title>

```

```

</head>

<body>

<div class="container">
    <h2>🌱 TerraSense Dashboard</h2>

```
<p><b>Click on the map to select your farm location</b></p>

<div id="map"></div>

<input id="lat" placeholder="Latitude" readonly>
<input id="lon" placeholder="Longitude" readonly>

<select id="crop">
    <option>Maize</option>
    <option>Rice</option>
    <option>Cassava</option>
    <option>Millet</option>
</select>

<input id="size" placeholder="Farm Size" value="2">

<button onclick="analyzeFarm()">Analyze Farm</button>

<div id="result" class="result"></div>
```

</div>

<!-- Leaflet JS -->

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
var map = L.map('map').setView([7.38, 3.93], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'Map data © OpenStreetMap'
}).addTo(map);

var marker;

map.on('click', function(e) {
    var lat = e.latlng.lat;
    var lon = e.latlng.lng;

    document.getElementById("lat").value = lat;
    document.getElementById("lon").value = lon;

    if (marker) {
        map.removeLayer(marker);
    }

    marker = L.marker([lat, lon]).addTo(map);
});

function analyzeFarm() {
    var lat = document.getElementById("lat").value;
    var lon = document.getElementById("lon").value;
    var crop = document.getElementById("crop").value;
    var size = document.getElementById("size").value;

    fetch("https://terrasense-ai.onrender.com/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            lat: parseFloat(lat),
            lon: parseFloat(lon),
            crop: crop,
            farm_size: parseFloat(size)
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerHTML =
            "<b>Status:</b> " + data.crop_status + "<br>" +
            "<b>Advice:</b> " + data.advice + "<br>" +
            "<b>Temperature:</b> " + data.temperature + "<br>" +
            "<b>NDVI:</b> " + data.ndvi + "<br>" +
            "<b>Carbon:</b> " + data.carbon;
    })
    .catch(err => {
        alert("Error: " + err);
    });
}
</script>

</body>
</html>
