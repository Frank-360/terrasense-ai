</head>

<body>

<h2>🌱 TerraSense</h2>

<label>Crop</label> <select id="crop"> <option>Maize</option> <option>Rice</option> </select>

<label>Farm Size</label> <input id="size" value="2">

<p>Click map to select location</p>

<div id="map"></div>

<input id="lat" placeholder="Latitude" readonly>
<input id="lon" placeholder="Longitude" readonly>

<button onclick="analyzeFarm()">Analyze</button>

<div id="result"></div>

<!-- Leaflet JS -->

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// Test JS is running
console.log("Script loaded");

// Map
var map = L.map('map').setView([7.38, 3.93], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var marker;

map.on('click', function(e) {
    var lat = e.latlng.lat;
    var lon = e.latlng.lng;

    document.getElementById("lat").value = lat;
    document.getElementById("lon").value = lon;

    if (marker) {
        map.removeLayer(marker);
    }

    marker = L.marker([lat, lon]).addTo(map);
});

// Analyze
function analyzeFarm() {

    console.log("Button clicked");

    var lat = document.getElementById("lat").value;

    if (!lat) {
        alert("Select location first");
        return;
    }
fetch("https://terrasense-ai.onrender.com/analyze", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        lat: parseFloat(lat),
        lon: parseFloat(lon),
        crop: document.getElementById("crop").value,
        farm_size: parseFloat(document.getElementById("size").value),
        method: document.getElementById("method")?.value,
        frequency: document.getElementById("frequency")?.value
    })
})
.then(res => res.json())
.then(data => {
    document.getElementById("result").innerHTML =
        "<b>Status:</b> " + data.crop_status + "<br>" +
        "<b>Advice:</b> " + data.advice + "<br>" +
        "<b>Temperature:</b> " + data.temperature + "<br>" +
        "<b>Rain (5 days):</b> " + data.rain_5days + "<br>" +
        "<b>NDVI:</b> " + data.ndvi + "<br>" +
        "<b>Water Saving:</b> " + data.water_saving + "%<br>" +
        "<b>Carbon:</b> " + data.carbon + "<br>" +
        "<b>Credits:</b> " + data.carbon_credits + "<br>" +
        "<b>Value ($):</b> " + data.carbon_value_usd;
})
.catch(err => {
    alert("Error: " + err);
});

</script>

</body>
</html>
