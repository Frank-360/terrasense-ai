<!DOCTYPE html>

<html>
<head>
<title>TerraSense</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    font-family: 'Segoe UI', Arial;
    background: #f4f7f6;
    padding: 20px;
}

.container {
    max-width: 750px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
}

h2,h5 {
    text-align: center;
    color: #2e7d32;
}

#map {
    height: 400px;
    margin: 15px 0;
    border-radius: 8px;
}

label {
    font-weight: 600;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.result {
    margin-top: 20px;
    padding: 15px;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0px 3px 10px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<div class="container">

<h2>🌱 TerraSense</h2>
<h5>The intelligence layer for modern farming</h5>

<div style="display:flex; gap:10px;">
    <div style="flex:1;">
        <label>Crop</label>
        <select id="crop">
            <option>Maize</option>
            <option>Rice</option>
            <option>Cassava</option>
            <option>Millet</option>
        </select>
    </div>

```
<div style="flex:1;">
    <label>Farm Size</label>
    <input id="size" value="2">
</div>
```

</div>

<div style="display:flex; gap:10px;">
    <div style="flex:1;">
        <label>Irrigation Method</label>
        <select id="method">
            <option>Rain-fed</option>
            <option>Manual (bucket)</option>
            <option>Small pump</option>
            <option>Large pump</option>
        </select>
    </div>

```
<div style="flex:1;">
    <label>Irrigation Frequency</label>
    <select id="frequency">
        <option>Rarely</option>
        <option>Weekly</option>
        <option>2-3 times/week</option>
        <option>Daily</option>
    </select>
</div>
```

</div>

<button onclick="getLocation()" style="background:#0288d1;">📍 Use My Location</button>

<p style="text-align:center;">OR</p>

<div id="map"></div>

<input id="lat" readonly placeholder="Latitude">
<input id="lon" readonly placeholder="Longitude">

<button onclick="analyzeFarm()">Analyze</button>

<div id="result" class="result"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// MAP
var map = L.map('map').setView([7.38, 3.93], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
}).addTo(map);

var marker;

// Click map
map.on('click', function(e) {
    updateLocation(e.latlng.lat, e.latlng.lng);
});

// Shared update function
function updateLocation(lat, lon){
    document.getElementById("lat").value = lat;
    document.getElementById("lon").value = lon;

    if (marker) map.removeLayer(marker);
    marker = L.marker([lat, lon]).addTo(map);

    map.setView([lat, lon], 13);
}

// GPS
function getLocation() {
    if (!navigator.geolocation) {
        alert("Geolocation not supported");
        return;
    }

    navigator.geolocation.getCurrentPosition(
        pos => {
            updateLocation(pos.coords.latitude, pos.coords.longitude);
            setTimeout(analyzeFarm, 300); // safe auto-run
        },
        () => alert("Location denied")
    );
}

// ANALYZE
function analyzeFarm(){

    const lat = document.getElementById("lat").value;
    const lon = document.getElementById("lon").value;

    if(!lat || !lon){
        alert("Select location first");
        return;
    }

    document.getElementById("result").innerHTML = "⏳ Analyzing...";

    fetch("https://terrasense-ai.onrender.com/analyze", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            lat: parseFloat(lat),
            lon: parseFloat(lon),
            crop: document.getElementById("crop").value,
            farm_size: parseFloat(document.getElementById("size").value),
            method: document.getElementById("method").value,
            frequency: document.getElementById("frequency").value
        })
    })
    .then(r => r.json())
    .then(data => {
    
        if (!data) {
        document.getElementById("result").innerHTML = "❌ Invalid response";
        return;
    }

    const status = data.crop_status || "Unknown";

    let statusColor = "#2e7d32"; // green
    if (status.includes("Moderate")) statusColor = "#f9a825"; // amber
    if (status.includes("High")) statusColor = "#c62828"; // red

    let explanation = "No data available.";

    if (status === "Healthy") {
        explanation = "Your crops are in good condition with sufficient moisture and growth.";
    } 
    else if (status.includes("Moderate")) {
        explanation = "Your crops are beginning to experience water stress. Early intervention can prevent yield loss.";
    } 
    else if (status.includes("High")) {
        explanation = "Your crops are under significant stress due to lack of water. Immediate action is required.";
    }

    let output = `
    <div style="padding:15px">

    <h3 style="color:${statusColor}; margin-bottom:5px;">
    ${data.icon || "🌱"} ${status}
    </h3>

    <p style="font-size:14px; color:#555;">
    ${explanation}
    </p>

    <div style="background:#e8f5e9; padding:12px; border-radius:8px; margin:10px 0;">
    <b>🌱 Recommended Action:</b><br>
    ${data.advice || "No recommendation available"}
    </div>

    <hr>

    <h4>📊 Farm Data</h4>

    <p>🌡 Temperature: <b>${data.temperature ?? "-"}°C</b></p>
    <p>🌧 Rain (5 days): <b>${data.rain_5days ?? "-"} mm</b></p>
    <p>🌿 Vegetation (NDVI): <b>${data.ndvi ?? "-"}</b> – ${data.vegetation_status || ""}</p>

    <hr>

    <h4>💧 Efficiency & Climate Impact</h4>

    <p>🤖 Water Saving: <b>${data.water_saving ?? 0}%</b></p>
    <p>🌱 Carbon Stored: <b>${data.carbon ?? 0} tons</b></p>
    <p>💰 Carbon Credits: <b>${data.carbon_credits ?? 0}</b></p>
    <p>💵 Estimated Value: <b>$${data.carbon_value_usd ?? 0}</b></p>

    <hr>

    <h4>📈 Climate Score</h4>
    <p style="font-size:18px;"><b>${data.climate_score ?? 0}/100</b></p>

    </div>
    `;

    document.getElementById("result").innerHTML = output;
})
.catch(()=>{
    document.getElementById("result").innerHTML = "❌ Server error";
});

    </script>
    </body>
    </html>
