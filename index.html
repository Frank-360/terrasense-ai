<!DOCTYPE html>

<html>
<head>
<title>TerraSense</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    font-family: 'Segoe UI', Arial;
    background: #f4f7f6;
    padding: 20px;
}

.container {
    max-width: 750px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
}

h2,h5 {
    text-align: center;
    color: #2e7d32;
}

#map {
    height: 400px;
    margin: 15px 0;
    border-radius: 8px;
}

label {
    font-weight: 600;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.result {
    margin-top: 20px;
    padding: 15px;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0px 3px 10px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<div class="container">

<h2>🌱 TerraSense</h2>
<h5>The intelligence layer for modern farming</h5>

<div style="display:flex; gap:10px;">
    <div style="flex:1;">
        <label>Crop</label>
        <select id="crop">
            <option>Maize</option>
            <option>Rice</option>
            <option>Cassava</option>
            <option>Millet</option>
        </select>
    </div>

```
<div style="flex:1;">
    <label>Farm Size</label>
    <input id="size" value="2">
</div>
```

</div>

<div style="display:flex; gap:10px;">
    <div style="flex:1;">
        <label>Irrigation Method</label>
        <select id="method">
            <option>Rain-fed</option>
            <option>Manual (bucket)</option>
            <option>Small pump</option>
            <option>Large pump</option>
        </select>
    </div>

```
<div style="flex:1;">
    <label>Irrigation Frequency</label>
    <select id="frequency">
        <option>Rarely</option>
        <option>Weekly</option>
        <option>2-3 times/week</option>
        <option>Daily</option>
    </select>
</div>
```

</div>

<button onclick="getLocation()" style="background:#0288d1;">📍 Use My Location</button>

<p style="text-align:center;">OR</p>

<div id="map"></div>

<input id="lat" readonly placeholder="Latitude">
<input id="lon" readonly placeholder="Longitude">

<button onclick="analyzeFarm()">Analyze</button>

<div id="result" class="result"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// MAP
var map = L.map('map').setView([7.38, 3.93], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
}).addTo(map);

var marker;

// Click map
map.on('click', function(e) {
    updateLocation(e.latlng.lat, e.latlng.lng);
});

// Shared update function
function updateLocation(lat, lon){
    document.getElementById("lat").value = lat;
    document.getElementById("lon").value = lon;

    if (marker) map.removeLayer(marker);
    marker = L.marker([lat, lon]).addTo(map);

    map.setView([lat, lon], 13);
}

// GPS
function getLocation() {
    if (!navigator.geolocation) {
        alert("Geolocation not supported");
        return;
    }

    navigator.geolocation.getCurrentPosition(
        pos => {
            updateLocation(pos.coords.latitude, pos.coords.longitude);
            setTimeout(analyzeFarm, 300); // safe auto-run
        },
        () => alert("Location denied")
    );
}

// ANALYZE
function analyzeFarm(){

    const lat = document.getElementById("lat").value;
    const lon = document.getElementById("lon").value;

    if(!lat || !lon){
        alert("Select location first");
        return;
    }

    document.getElementById("result").innerHTML = "⏳ Analyzing...";

    fetch("https://terrasense-ai.onrender.com/analyze", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            lat: parseFloat(lat),
            lon: parseFloat(lon),
            crop: document.getElementById("crop").value,
            farm_size: parseFloat(document.getElementById("size").value),
            method: document.getElementById("method").value,
            frequency: document.getElementById("frequency").value
        })
    })
    .then(r => r.json())
    .then(data => {

        let output = `
        <h4>🌱 Farm Insights</h4>
        <h3>${data.icon} ${data.crop_status}</h3>
        <p><b>Advice:</b> ${data.advice}</p>
        <hr>
        🌡 ${data.temperature}°C <br>
        🌧 ${data.rain_5days} mm <br>
        🌿 NDVI: ${data.ndvi} <br>
        🤖 Water Saving: ${data.water_saving}% <br>
        🌱 Carbon: ${data.carbon} <br>
        💰 Credits: ${data.carbon_credits} <br>
        💵 $${data.carbon_value_usd}
        `;

        document.getElementById("result").innerHTML = output;

    })
    .catch(()=>{
        document.getElementById("result").innerHTML = "❌ Server error";
    });
}

</script>

</body>
</html>
